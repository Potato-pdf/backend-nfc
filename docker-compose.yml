version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: nfc_user
      POSTGRES_PASSWORD: nfc_password
      POSTGRES_DB: nfc_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nfc_user -d nfc_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://nfc_user:nfc_password@db:5432/nfc_db
      PORT: 3000
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
